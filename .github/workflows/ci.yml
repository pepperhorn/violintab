name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# A newer push to the same ref cancels older in-progress runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test, type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npx astro check
      - run: npm run build

  docker:
    name: Docker image builds (Coolify parity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # Build the same image Coolify will, but don't push it anywhere — this
      # just fails the run if the Dockerfile / production build is broken.
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: violintab:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
