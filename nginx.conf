server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Clean URLs; fall back to the single page if a path isn't a file.
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Long-cache fingerprinted assets and fonts.
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml font/ttf;
    gzip_min_length 1024;

    # Lightweight health endpoint for Coolify's container health check.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
